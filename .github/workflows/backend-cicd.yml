name: Backend CI/CD

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

env:
  AWS_REGION: ap-south-1
  ECR_REGISTRY: 406223548776.dkr.ecr.ap-south-1.amazonaws.com
  ECR_REPOSITORY: vr-backend

jobs:
  build-and-push:
    name: Build and Push to ECR
    runs-on: ubuntu-latest
    outputs:
      image_uri: ${{ steps.image.outputs.image_uri }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        run: |
          echo "JAVA_HOME=${JAVA_HOME_17_X64}" >> $GITHUB_ENV
          echo "${JAVA_HOME_17_X64}/bin" >> $GITHUB_PATH

      - name: Build JAR
        run: mvn clean package -DskipTests

      - name: Configure AWS credentials
        run: |
          echo "AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }}" >> $GITHUB_ENV
          echo "AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }}" >> $GITHUB_ENV
          echo "AWS_DEFAULT_REGION=${{ env.AWS_REGION }}" >> $GITHUB_ENV

      - name: Login to Amazon ECR
        run: aws ecr get-login-password --region ${{ env.AWS_REGION }} | docker login --username AWS --password-stdin ${{ env.ECR_REGISTRY }}

      - name: Build, tag and push Docker image
        run: |
          docker build -t vr-backend .
          docker tag vr-backend:latest ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:latest
          docker push ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:latest

      - name: Export image URI
        id: image
        run: echo "image_uri=${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:latest" >> "$GITHUB_OUTPUT"

  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Write SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Create .env file on runner
        run: |
          {
            echo "PORT=${{ secrets.PORT }}"
            echo "SERVER_PORT=${{ secrets.SERVER_PORT }}"
            echo "SPRING_PROFILES_DEFAULT=${{ secrets.SPRING_PROFILES_DEFAULT }}"
            echo "MAIL_USERNAME=${{ secrets.MAIL_USERNAME }}"
            echo "MAIL_APP_PASSWORD=${{ secrets.MAIL_APP_PASSWORD }}"
            echo "MAIL_FROM=${{ secrets.MAIL_FROM }}"
            echo "MAIL_FROM_NAME=${{ secrets.MAIL_FROM_NAME }}"
            echo "ADMIN_OTP_TTL_MINUTES=${{ secrets.ADMIN_OTP_TTL_MINUTES }}"
            echo "ADMIN_OTP_RESEND_COOLDOWN_SECONDS=${{ secrets.ADMIN_OTP_RESEND_COOLDOWN_SECONDS }}"
            echo "ADMIN_OTP_MAX_ATTEMPTS=${{ secrets.ADMIN_OTP_MAX_ATTEMPTS }}"
            echo "ADMIN_OTP_DEV_LOG=${{ secrets.ADMIN_OTP_DEV_LOG }}"
            echo "APP_ADMIN_SEED_ENABLED=${{ secrets.APP_ADMIN_SEED_ENABLED }}"
            echo "APP_ADMIN_SEED_OVERWRITE=${{ secrets.APP_ADMIN_SEED_OVERWRITE }}"
            echo "APP_ADMIN_SEED_EMAIL=${{ secrets.APP_ADMIN_SEED_EMAIL }}"
            echo "APP_ADMIN_SEED_PASSWORD=${{ secrets.APP_ADMIN_SEED_PASSWORD }}"
            echo "APP_ADMIN_SEED_NAME=${{ secrets.APP_ADMIN_SEED_NAME }}"
            echo "DB_URL=${{ secrets.DB_URL }}"
            echo "DB_USERNAME=${{ secrets.DB_USERNAME }}"
            echo "DB_PASSWORD=${{ secrets.DB_PASSWORD }}"
            echo "APP_JWT_SECRET=${{ secrets.APP_JWT_SECRET }}"
            echo "APP_JWT_EXPIRY_MS=${{ secrets.APP_JWT_EXPIRY_MS }}"
            echo "APP_JWT_REFRESH_EXPIRY_MS=${{ secrets.APP_JWT_REFRESH_EXPIRY_MS }}"
            echo "FIREBASE_PROJECT_ID=${{ secrets.FIREBASE_PROJECT_ID }}"
            echo "FIREBASE_CREDENTIALS_PATH=${{ secrets.FIREBASE_CREDENTIALS_PATH }}"
            echo "FIREBASE_CREDENTIALS_JSON=${{ secrets.FIREBASE_CREDENTIALS_JSON }}"
            echo "APP_CORS_ALLOWED_ORIGINS=${{ secrets.APP_CORS_ALLOWED_ORIGINS }}"
            echo "APP_RAZORPAY_ENABLED=${{ secrets.APP_RAZORPAY_ENABLED }}"
            echo "APP_RAZORPAY_KEY_ID=${{ secrets.APP_RAZORPAY_KEY_ID }}"
            echo "APP_RAZORPAY_KEY_SECRET=${{ secrets.APP_RAZORPAY_KEY_SECRET }}"
            echo "APP_RAZORPAY_WEBHOOK_SECRET=${{ secrets.APP_RAZORPAY_WEBHOOK_SECRET }}"
            echo "APP_RAZORPAY_CURRENCY=${{ secrets.APP_RAZORPAY_CURRENCY }}"
            echo "APP_RAZORPAY_API_BASE_URL=${{ secrets.APP_RAZORPAY_API_BASE_URL }}"
            echo "APP_RAZORPAY_MERCHANT_NAME=${{ secrets.APP_RAZORPAY_MERCHANT_NAME }}"
            echo "CLOUDINARY_CLOUD_NAME=${{ secrets.CLOUDINARY_CLOUD_NAME }}"
            echo "CLOUDINARY_API_KEY=${{ secrets.CLOUDINARY_API_KEY }}"
            echo "CLOUDINARY_API_SECRET=${{ secrets.CLOUDINARY_API_SECRET }}"
            echo "APP_WHATSAPP_ENABLED=${{ secrets.APP_WHATSAPP_ENABLED }}"
            echo "APP_WHATSAPP_PROVIDER_URL=${{ secrets.APP_WHATSAPP_PROVIDER_URL }}"
            echo "APP_WHATSAPP_BEARER_TOKEN=${{ secrets.APP_WHATSAPP_BEARER_TOKEN }}"
            echo "APP_WEBSITE_BASE_URL=${{ secrets.APP_WEBSITE_BASE_URL }}"
            echo "APP_RATE_LIMIT_WINDOW_SECONDS=${{ secrets.APP_RATE_LIMIT_WINDOW_SECONDS }}"
            echo "APP_RATE_LIMIT_MAX_REQUESTS=${{ secrets.APP_RATE_LIMIT_MAX_REQUESTS }}"
            echo "FLYWAY_ENABLED=${{ secrets.FLYWAY_ENABLED }}"
            echo "WEBAUTHN_RP_ID=myadmin.anushatechnologies.com"
            echo "WEBAUTHN_RP_NAME=VR Technologies Admin"
          } > /tmp/app.env
          echo "Created .env with $(wc -l < /tmp/app.env) variables"

      - name: Create deploy script on runner
        run: |
          cat > /tmp/deploy.sh << 'DEPLOY_SCRIPT'
          #!/bin/bash
          set -e
          echo "Logging in to ECR..."
          aws ecr get-login-password --region ap-south-1 | docker login --username AWS --password-stdin 406223548776.dkr.ecr.ap-south-1.amazonaws.com
          echo "Pulling latest image..."
          docker pull 406223548776.dkr.ecr.ap-south-1.amazonaws.com/vr-backend:latest
          echo "Stopping old container..."
          docker stop vr-backend 2>/dev/null || true
          docker rm vr-backend 2>/dev/null || true
          echo "Starting new container..."
          docker run -d --name vr-backend --restart unless-stopped --env-file ~/vr-backend/.env -p 8080:8080 406223548776.dkr.ecr.ap-south-1.amazonaws.com/vr-backend:latest
          docker image prune -f
          echo "Container status:"
          docker ps --filter name=vr-backend
          echo "Waiting for startup..."
          sleep 8
          docker logs --tail 20 vr-backend
          DEPLOY_SCRIPT
          chmod +x /tmp/deploy.sh

      - name: Copy files to EC2
        env:
          REMOTE: ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}
          SSH_OPTS: -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no
        run: |
          ssh $SSH_OPTS $REMOTE "mkdir -p ~/vr-backend"
          scp $SSH_OPTS /tmp/app.env $REMOTE:~/vr-backend/.env
          scp $SSH_OPTS /tmp/deploy.sh $REMOTE:~/deploy.sh
          echo "Files copied to EC2"

      - name: Run deploy script on EC2
        env:
          REMOTE: ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}
          SSH_OPTS: -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no
        run: ssh $SSH_OPTS $REMOTE "bash ~/deploy.sh"
