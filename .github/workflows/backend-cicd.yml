name: Backend CI/CD

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

env:
  AWS_REGION: ap-south-1
  ECR_REGISTRY: 406223548776.dkr.ecr.ap-south-1.amazonaws.com
  ECR_REPOSITORY: vr-backend
  IMAGE_NAME: vr-backend
  CONTAINER_NAME: vr-backend
  HOST_PORT: "8080"
  CONTAINER_PORT: "8080"

jobs:
  build-and-push:
    name: Build and Push to ECR
    runs-on: ubuntu-latest
    outputs:
      image_uri: ${{ steps.image.outputs.image_uri }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17 (Pre-installed on runner)
        run: |
          echo "JAVA_HOME=${JAVA_HOME_17_X64}" >> $GITHUB_ENV
          echo "${JAVA_HOME_17_X64}/bin" >> $GITHUB_PATH

      - name: Build JAR
        run: mvn clean package -DskipTests

      - name: Configure AWS credentials (shell)
        run: |
          echo "AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }}" >> $GITHUB_ENV
          echo "AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }}" >> $GITHUB_ENV
          echo "AWS_DEFAULT_REGION=${{ env.AWS_REGION }}" >> $GITHUB_ENV

      - name: Login to Amazon ECR (shell)
        run: |
          aws ecr get-login-password --region ${{ env.AWS_REGION }} \
            | docker login --username AWS --password-stdin ${{ env.ECR_REGISTRY }}

      - name: Build Docker image
        run: docker build -t ${{ env.IMAGE_NAME }} .

      - name: Tag Docker image
        run: docker tag ${{ env.IMAGE_NAME }}:latest ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:latest

      - name: Push Docker image
        run: docker push ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:latest

      - name: Export image URI
        id: image
        run: echo "image_uri=${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:latest" >> "$GITHUB_OUTPUT"

  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Write SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Deploy over SSH (shell)
        env:
          IMAGE_URI: ${{ needs.build-and-push.outputs.image_uri }}
        run: |
          ssh -i ~/.ssh/deploy_key \
              -o StrictHostKeyChecking=no \
              ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'ENDSSH'
            set -e
            mkdir -p ~/vr-backend
            cd ~/vr-backend

            cat > .env << 'EOF'
            PORT=${{ secrets.PORT }}
            SERVER_PORT=${{ secrets.SERVER_PORT }}
            SPRING_PROFILES_DEFAULT=${{ secrets.SPRING_PROFILES_DEFAULT }}
            MAIL_USERNAME=${{ secrets.MAIL_USERNAME }}
            MAIL_APP_PASSWORD=${{ secrets.MAIL_APP_PASSWORD }}
            MAIL_FROM=${{ secrets.MAIL_FROM }}
            MAIL_FROM_NAME=${{ secrets.MAIL_FROM_NAME }}
            ADMIN_OTP_TTL_MINUTES=${{ secrets.ADMIN_OTP_TTL_MINUTES }}
            ADMIN_OTP_RESEND_COOLDOWN_SECONDS=${{ secrets.ADMIN_OTP_RESEND_COOLDOWN_SECONDS }}
            ADMIN_OTP_MAX_ATTEMPTS=${{ secrets.ADMIN_OTP_MAX_ATTEMPTS }}
            ADMIN_OTP_DEV_LOG=${{ secrets.ADMIN_OTP_DEV_LOG }}
            APP_ADMIN_SEED_ENABLED=${{ secrets.APP_ADMIN_SEED_ENABLED }}
            APP_ADMIN_SEED_OVERWRITE=${{ secrets.APP_ADMIN_SEED_OVERWRITE }}
            APP_ADMIN_SEED_EMAIL=${{ secrets.APP_ADMIN_SEED_EMAIL }}
            APP_ADMIN_SEED_PASSWORD=${{ secrets.APP_ADMIN_SEED_PASSWORD }}
            APP_ADMIN_SEED_NAME=${{ secrets.APP_ADMIN_SEED_NAME }}
            DB_URL=${{ secrets.DB_URL }}
            DB_USERNAME=${{ secrets.DB_USERNAME }}
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            APP_JWT_SECRET=${{ secrets.APP_JWT_SECRET }}
            APP_JWT_EXPIRY_MS=${{ secrets.APP_JWT_EXPIRY_MS }}
            APP_JWT_REFRESH_EXPIRY_MS=${{ secrets.APP_JWT_REFRESH_EXPIRY_MS }}
            FIREBASE_PROJECT_ID=${{ secrets.FIREBASE_PROJECT_ID }}
            FIREBASE_CREDENTIALS_PATH=${{ secrets.FIREBASE_CREDENTIALS_PATH }}
            FIREBASE_CREDENTIALS_JSON=${{ secrets.FIREBASE_CREDENTIALS_JSON }}
            APP_CORS_ALLOWED_ORIGINS=${{ secrets.APP_CORS_ALLOWED_ORIGINS }}
            APP_RAZORPAY_ENABLED=${{ secrets.APP_RAZORPAY_ENABLED }}
            APP_RAZORPAY_KEY_ID=${{ secrets.APP_RAZORPAY_KEY_ID }}
            APP_RAZORPAY_KEY_SECRET=${{ secrets.APP_RAZORPAY_KEY_SECRET }}
            APP_RAZORPAY_WEBHOOK_SECRET=${{ secrets.APP_RAZORPAY_WEBHOOK_SECRET }}
            APP_RAZORPAY_CURRENCY=${{ secrets.APP_RAZORPAY_CURRENCY }}
            APP_RAZORPAY_API_BASE_URL=${{ secrets.APP_RAZORPAY_API_BASE_URL }}
            APP_RAZORPAY_MERCHANT_NAME=${{ secrets.APP_RAZORPAY_MERCHANT_NAME }}
            CLOUDINARY_CLOUD_NAME=${{ secrets.CLOUDINARY_CLOUD_NAME }}
            CLOUDINARY_API_KEY=${{ secrets.CLOUDINARY_API_KEY }}
            CLOUDINARY_API_SECRET=${{ secrets.CLOUDINARY_API_SECRET }}
            APP_WHATSAPP_ENABLED=${{ secrets.APP_WHATSAPP_ENABLED }}
            APP_WHATSAPP_PROVIDER_URL=${{ secrets.APP_WHATSAPP_PROVIDER_URL }}
            APP_WHATSAPP_BEARER_TOKEN=${{ secrets.APP_WHATSAPP_BEARER_TOKEN }}
            APP_WEBSITE_BASE_URL=${{ secrets.APP_WEBSITE_BASE_URL }}
            APP_RATE_LIMIT_WINDOW_SECONDS=${{ secrets.APP_RATE_LIMIT_WINDOW_SECONDS }}
            APP_RATE_LIMIT_MAX_REQUESTS=${{ secrets.APP_RATE_LIMIT_MAX_REQUESTS }}
            FLYWAY_ENABLED=${{ secrets.FLYWAY_ENABLED }}
            WEBAUTHN_RP_ID=myadmin.anushatechnologies.com
            WEBAUTHN_RP_NAME=VR Technologies Admin
            EOF

            aws ecr get-login-password --region ap-south-1 \
              | docker login --username AWS --password-stdin 406223548776.dkr.ecr.ap-south-1.amazonaws.com

            docker pull 406223548776.dkr.ecr.ap-south-1.amazonaws.com/vr-backend:latest
            docker rm -f vr-backend || true
            docker run -d \
              --name vr-backend \
              --restart unless-stopped \
              --env-file .env \
              -p 8080:8080 \
              406223548776.dkr.ecr.ap-south-1.amazonaws.com/vr-backend:latest

            docker image prune -f
            docker logs --tail 50 vr-backend
          ENDSSH
