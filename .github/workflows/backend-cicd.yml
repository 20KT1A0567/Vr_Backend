name: Backend CI/CD

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

env:
  AWS_REGION: ap-south-1
  ECR_REGISTRY: 406223548776.dkr.ecr.ap-south-1.amazonaws.com
  ECR_REPOSITORY: vr-backend
  IMAGE_NAME: vr-backend
  CONTAINER_NAME: vr-backend
  HOST_PORT: "8080"
  CONTAINER_PORT: "8080"

jobs:
  build-and-push:
    name: Build and Push to ECR
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    outputs:
      image_uri: ${{ steps.image.outputs.image_uri }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Build JAR
        run: mvn clean package -DskipTests

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker image
        run: docker build -t ${{ env.IMAGE_NAME }} .

      - name: Tag Docker image
        run: docker tag ${{ env.IMAGE_NAME }}:latest ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:latest

      - name: Push Docker image
        run: docker push ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:latest

      - name: Export image URI
        id: image
        run: echo "image_uri=${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:latest" >> "$GITHUB_OUTPUT"

  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          IMAGE_URI: ${{ needs.build-and-push.outputs.image_uri }}
          AWS_REGION: ${{ env.AWS_REGION }}
          ECR_REGISTRY: ${{ env.ECR_REGISTRY }}
          CONTAINER_NAME: ${{ env.CONTAINER_NAME }}
          HOST_PORT: ${{ env.HOST_PORT }}
          CONTAINER_PORT: ${{ env.CONTAINER_PORT }}
          PORT: ${{ secrets.PORT }}
          SERVER_PORT: ${{ secrets.SERVER_PORT }}
          SPRING_PROFILES_DEFAULT: ${{ secrets.SPRING_PROFILES_DEFAULT }}
          MAIL_USERNAME: ${{ secrets.MAIL_USERNAME }}
          MAIL_APP_PASSWORD: ${{ secrets.MAIL_APP_PASSWORD }}
          MAIL_FROM: ${{ secrets.MAIL_FROM }}
          MAIL_FROM_NAME: ${{ secrets.MAIL_FROM_NAME }}
          ADMIN_OTP_TTL_MINUTES: ${{ secrets.ADMIN_OTP_TTL_MINUTES }}
          ADMIN_OTP_RESEND_COOLDOWN_SECONDS: ${{ secrets.ADMIN_OTP_RESEND_COOLDOWN_SECONDS }}
          ADMIN_OTP_MAX_ATTEMPTS: ${{ secrets.ADMIN_OTP_MAX_ATTEMPTS }}
          ADMIN_OTP_DEV_LOG: ${{ secrets.ADMIN_OTP_DEV_LOG }}
          APP_ADMIN_SEED_ENABLED: ${{ secrets.APP_ADMIN_SEED_ENABLED }}
          APP_ADMIN_SEED_OVERWRITE: ${{ secrets.APP_ADMIN_SEED_OVERWRITE }}
          APP_ADMIN_SEED_EMAIL: ${{ secrets.APP_ADMIN_SEED_EMAIL }}
          APP_ADMIN_SEED_PASSWORD: ${{ secrets.APP_ADMIN_SEED_PASSWORD }}
          APP_ADMIN_SEED_NAME: ${{ secrets.APP_ADMIN_SEED_NAME }}
          DB_URL: ${{ secrets.DB_URL }}
          DB_USERNAME: ${{ secrets.DB_USERNAME }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          APP_JWT_SECRET: ${{ secrets.APP_JWT_SECRET }}
          APP_JWT_EXPIRY_MS: ${{ secrets.APP_JWT_EXPIRY_MS }}
          APP_JWT_REFRESH_EXPIRY_MS: ${{ secrets.APP_JWT_REFRESH_EXPIRY_MS }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_CREDENTIALS_PATH: ${{ secrets.FIREBASE_CREDENTIALS_PATH }}
          FIREBASE_CREDENTIALS_JSON: ${{ secrets.FIREBASE_CREDENTIALS_JSON }}
          APP_CORS_ALLOWED_ORIGINS: ${{ secrets.APP_CORS_ALLOWED_ORIGINS }}
          APP_RAZORPAY_ENABLED: ${{ secrets.APP_RAZORPAY_ENABLED }}
          APP_RAZORPAY_KEY_ID: ${{ secrets.APP_RAZORPAY_KEY_ID }}
          APP_RAZORPAY_KEY_SECRET: ${{ secrets.APP_RAZORPAY_KEY_SECRET }}
          APP_RAZORPAY_WEBHOOK_SECRET: ${{ secrets.APP_RAZORPAY_WEBHOOK_SECRET }}
          APP_RAZORPAY_CURRENCY: ${{ secrets.APP_RAZORPAY_CURRENCY }}
          APP_RAZORPAY_API_BASE_URL: ${{ secrets.APP_RAZORPAY_API_BASE_URL }}
          APP_RAZORPAY_MERCHANT_NAME: ${{ secrets.APP_RAZORPAY_MERCHANT_NAME }}
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
          APP_WHATSAPP_ENABLED: ${{ secrets.APP_WHATSAPP_ENABLED }}
          APP_WHATSAPP_PROVIDER_URL: ${{ secrets.APP_WHATSAPP_PROVIDER_URL }}
          APP_WHATSAPP_BEARER_TOKEN: ${{ secrets.APP_WHATSAPP_BEARER_TOKEN }}
          APP_WEBSITE_BASE_URL: ${{ secrets.APP_WEBSITE_BASE_URL }}
          APP_RATE_LIMIT_WINDOW_SECONDS: ${{ secrets.APP_RATE_LIMIT_WINDOW_SECONDS }}
          APP_RATE_LIMIT_MAX_REQUESTS: ${{ secrets.APP_RATE_LIMIT_MAX_REQUESTS }}
          FLYWAY_ENABLED: ${{ secrets.FLYWAY_ENABLED }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: IMAGE_URI,AWS_REGION,ECR_REGISTRY,CONTAINER_NAME,HOST_PORT,CONTAINER_PORT,PORT,SERVER_PORT,SPRING_PROFILES_DEFAULT,MAIL_USERNAME,MAIL_APP_PASSWORD,MAIL_FROM,MAIL_FROM_NAME,ADMIN_OTP_TTL_MINUTES,ADMIN_OTP_RESEND_COOLDOWN_SECONDS,ADMIN_OTP_MAX_ATTEMPTS,ADMIN_OTP_DEV_LOG,APP_ADMIN_SEED_ENABLED,APP_ADMIN_SEED_OVERWRITE,APP_ADMIN_SEED_EMAIL,APP_ADMIN_SEED_PASSWORD,APP_ADMIN_SEED_NAME,DB_URL,DB_USERNAME,DB_PASSWORD,APP_JWT_SECRET,APP_JWT_EXPIRY_MS,APP_JWT_REFRESH_EXPIRY_MS,FIREBASE_PROJECT_ID,FIREBASE_CREDENTIALS_PATH,FIREBASE_CREDENTIALS_JSON,APP_CORS_ALLOWED_ORIGINS,APP_RAZORPAY_ENABLED,APP_RAZORPAY_KEY_ID,APP_RAZORPAY_KEY_SECRET,APP_RAZORPAY_WEBHOOK_SECRET,APP_RAZORPAY_CURRENCY,APP_RAZORPAY_API_BASE_URL,APP_RAZORPAY_MERCHANT_NAME,CLOUDINARY_CLOUD_NAME,CLOUDINARY_API_KEY,CLOUDINARY_API_SECRET,APP_WHATSAPP_ENABLED,APP_WHATSAPP_PROVIDER_URL,APP_WHATSAPP_BEARER_TOKEN,APP_WEBSITE_BASE_URL,APP_RATE_LIMIT_WINDOW_SECONDS,APP_RATE_LIMIT_MAX_REQUESTS,FLYWAY_ENABLED
          script_stop: true
          script: |
            set -e

            mkdir -p ~/vr-backend
            cd ~/vr-backend

            cat > .env <<EOF
            PORT=${PORT}
            SERVER_PORT=${SERVER_PORT}
            SPRING_PROFILES_DEFAULT=${SPRING_PROFILES_DEFAULT}
            MAIL_USERNAME=${MAIL_USERNAME}
            MAIL_APP_PASSWORD=${MAIL_APP_PASSWORD}
            MAIL_FROM=${MAIL_FROM}
            MAIL_FROM_NAME=${MAIL_FROM_NAME}
            ADMIN_OTP_TTL_MINUTES=${ADMIN_OTP_TTL_MINUTES}
            ADMIN_OTP_RESEND_COOLDOWN_SECONDS=${ADMIN_OTP_RESEND_COOLDOWN_SECONDS}
            ADMIN_OTP_MAX_ATTEMPTS=${ADMIN_OTP_MAX_ATTEMPTS}
            ADMIN_OTP_DEV_LOG=${ADMIN_OTP_DEV_LOG}
            APP_ADMIN_SEED_ENABLED=${APP_ADMIN_SEED_ENABLED}
            APP_ADMIN_SEED_OVERWRITE=${APP_ADMIN_SEED_OVERWRITE}
            APP_ADMIN_SEED_EMAIL=${APP_ADMIN_SEED_EMAIL}
            APP_ADMIN_SEED_PASSWORD=${APP_ADMIN_SEED_PASSWORD}
            APP_ADMIN_SEED_NAME=${APP_ADMIN_SEED_NAME}
            DB_URL=${DB_URL}
            DB_USERNAME=${DB_USERNAME}
            DB_PASSWORD=${DB_PASSWORD}
            APP_JWT_SECRET=${APP_JWT_SECRET}
            APP_JWT_EXPIRY_MS=${APP_JWT_EXPIRY_MS}
            APP_JWT_REFRESH_EXPIRY_MS=${APP_JWT_REFRESH_EXPIRY_MS}
            FIREBASE_PROJECT_ID=${FIREBASE_PROJECT_ID}
            FIREBASE_CREDENTIALS_PATH=${FIREBASE_CREDENTIALS_PATH}
            FIREBASE_CREDENTIALS_JSON=${FIREBASE_CREDENTIALS_JSON}
            APP_CORS_ALLOWED_ORIGINS=${APP_CORS_ALLOWED_ORIGINS}
            APP_RAZORPAY_ENABLED=${APP_RAZORPAY_ENABLED}
            APP_RAZORPAY_KEY_ID=${APP_RAZORPAY_KEY_ID}
            APP_RAZORPAY_KEY_SECRET=${APP_RAZORPAY_KEY_SECRET}
            APP_RAZORPAY_WEBHOOK_SECRET=${APP_RAZORPAY_WEBHOOK_SECRET}
            APP_RAZORPAY_CURRENCY=${APP_RAZORPAY_CURRENCY}
            APP_RAZORPAY_API_BASE_URL=${APP_RAZORPAY_API_BASE_URL}
            APP_RAZORPAY_MERCHANT_NAME=${APP_RAZORPAY_MERCHANT_NAME}
            CLOUDINARY_CLOUD_NAME=${CLOUDINARY_CLOUD_NAME}
            CLOUDINARY_API_KEY=${CLOUDINARY_API_KEY}
            CLOUDINARY_API_SECRET=${CLOUDINARY_API_SECRET}
            APP_WHATSAPP_ENABLED=${APP_WHATSAPP_ENABLED}
            APP_WHATSAPP_PROVIDER_URL=${APP_WHATSAPP_PROVIDER_URL}
            APP_WHATSAPP_BEARER_TOKEN=${APP_WHATSAPP_BEARER_TOKEN}
            APP_WEBSITE_BASE_URL=${APP_WEBSITE_BASE_URL}
            APP_RATE_LIMIT_WINDOW_SECONDS=${APP_RATE_LIMIT_WINDOW_SECONDS}
            APP_RATE_LIMIT_MAX_REQUESTS=${APP_RATE_LIMIT_MAX_REQUESTS}
            FLYWAY_ENABLED=${FLYWAY_ENABLED}
            EOF

            aws ecr get-login-password --region "${AWS_REGION}" | docker login --username AWS --password-stdin "${ECR_REGISTRY}"
            docker pull "${IMAGE_URI}"
            docker rm -f "${CONTAINER_NAME}" || true
            docker run -d \
              --name "${CONTAINER_NAME}" \
              --restart unless-stopped \
              --env-file .env \
              -p "${HOST_PORT}:${CONTAINER_PORT}" \
              "${IMAGE_URI}"

            docker image prune -f
            docker logs --tail 100 "${CONTAINER_NAME}"
