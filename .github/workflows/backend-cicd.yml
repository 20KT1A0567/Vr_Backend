name: Backend CI/CD

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

env:
  AWS_REGION: ap-south-1
  ECR_REGISTRY: 406223548776.dkr.ecr.ap-south-1.amazonaws.com
  ECR_REPOSITORY: vr-backend
  IMAGE_NAME: vr-backend
  CONTAINER_NAME: vr-backend
  HOST_PORT: "8080"
  CONTAINER_PORT: "8080"

jobs:
  build-and-push:
    name: Build and Push to ECR
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    outputs:
      image_uri: ${{ steps.image.outputs.image_uri }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Build JAR
        run: mvn clean package -DskipTests

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker image
        run: docker build -t ${{ env.IMAGE_NAME }} .

      - name: Tag Docker image
        run: docker tag ${{ env.IMAGE_NAME }}:latest ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:latest

      - name: Push Docker image
        run: docker push ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:latest

      - name: Export image URI
        id: image
        run: echo "image_uri=${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:latest" >> "$GITHUB_OUTPUT"

  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          IMAGE_URI: ${{ needs.build-and-push.outputs.image_uri }}
          AWS_REGION: ${{ env.AWS_REGION }}
          ECR_REGISTRY: ${{ env.ECR_REGISTRY }}
          CONTAINER_NAME: ${{ env.CONTAINER_NAME }}
          HOST_PORT: ${{ env.HOST_PORT }}
          CONTAINER_PORT: ${{ env.CONTAINER_PORT }}
          BACKEND_ENV_FILE: ${{ secrets.BACKEND_ENV_FILE }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: IMAGE_URI,AWS_REGION,ECR_REGISTRY,CONTAINER_NAME,HOST_PORT,CONTAINER_PORT,BACKEND_ENV_FILE
          script_stop: true
          script: |
            set -e

            mkdir -p ~/vr-backend
            cd ~/vr-backend

            cat > .env <<'EOF'
            ${BACKEND_ENV_FILE}
            EOF

            aws ecr get-login-password --region "${AWS_REGION}" | docker login --username AWS --password-stdin "${ECR_REGISTRY}"
            docker pull "${IMAGE_URI}"
            docker rm -f "${CONTAINER_NAME}" || true
            docker run -d \
              --name "${CONTAINER_NAME}" \
              --restart unless-stopped \
              --env-file .env \
              -p "${HOST_PORT}:${CONTAINER_PORT}" \
              "${IMAGE_URI}"

            docker image prune -f
            docker logs --tail 100 "${CONTAINER_NAME}"
