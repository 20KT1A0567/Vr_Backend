spring.application.name=vrtech

# Database
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/vrtech_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.show-sql=${SHOW_SQL:false}

# Server
server.port=${SERVER_PORT:8080}
server.servlet.context-path=/

# JWT
app.jwt.secret=${APP_JWT_SECRET:change-me-to-a-long-256-bit-secret}
app.jwt.expiry-ms=${APP_JWT_EXPIRY_MS:604800000}

# Dev admin seed
app.admin.seed-enabled=${APP_ADMIN_SEED_ENABLED:true}
app.admin.seed-email=${APP_ADMIN_SEED_EMAIL:admin@vrtech.in}
app.admin.seed-password=${APP_ADMIN_SEED_PASSWORD:Admin@123}
app.admin.seed-name=${APP_ADMIN_SEED_NAME:VR Admin}

# CORS
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:5174}

# Cloudinary
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:}
cloudinary.api-key=${CLOUDINARY_API_KEY:}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:}

# File upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=25MB
