spring.application.name=vrtech
spring.profiles.default=local
spring.jmx.unique-names=true
management.endpoints.jmx.unique-names=true

# Database
spring.datasource.url=${DB_URL:}
spring.datasource.username=${DB_USERNAME:}
spring.datasource.password=${DB_PASSWORD:}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.show-sql=${SHOW_SQL:false}

# Server
server.port=${PORT:${SERVER_PORT:8080}}
server.servlet.context-path=/

# JWT
app.jwt.secret=${APP_JWT_SECRET:change-me-to-a-long-256-bit-secret}
app.jwt.expiry-ms=${APP_JWT_EXPIRY_MS:604800000}
app.jwt.refresh-expiry-ms=${APP_JWT_REFRESH_EXPIRY_MS:2592000000}

# Firebase (phone OTP login)
app.firebase.credentials-path=${FIREBASE_CREDENTIALS_PATH:file:../anushabazaar-2288e-firebase-adminsdk-fbsvc-658ac604a3.json}
app.firebase.project-id=${FIREBASE_PROJECT_ID:anushabazaar-2288e}

# Dev admin seed
app.admin.seed-enabled=${APP_ADMIN_SEED_ENABLED:true}
app.admin.seed-email=${APP_ADMIN_SEED_EMAIL:superadmin@vrtechnologies.com}
app.admin.seed-password=${APP_ADMIN_SEED_PASSWORD:ChangeMe@123}
app.admin.seed-name=${APP_ADMIN_SEED_NAME:VR Technologies Super Admin}

# Razorpay
app.razorpay.enabled=${APP_RAZORPAY_ENABLED:false}
app.razorpay.key-id=${APP_RAZORPAY_KEY_ID:}
app.razorpay.key-secret=${APP_RAZORPAY_KEY_SECRET:}
app.razorpay.webhook-secret=${APP_RAZORPAY_WEBHOOK_SECRET:}
app.razorpay.currency=${APP_RAZORPAY_CURRENCY:INR}
app.razorpay.api-base-url=${APP_RAZORPAY_API_BASE_URL:https://api.razorpay.com/v1}
app.razorpay.merchant-name=${APP_RAZORPAY_MERCHANT_NAME:VR Technologies}

# CORS
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:5174}

# Cloudinary
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:}
cloudinary.api-key=${CLOUDINARY_API_KEY:}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:}
# File upload
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=110MB
