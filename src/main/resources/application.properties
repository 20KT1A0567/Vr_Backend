spring.application.name=vrtech
spring.profiles.default=local
spring.jmx.unique-names=true
management.endpoints.jmx.unique-names=true

# Database
spring.datasource.url=${DB_URL:}
spring.datasource.username=${DB_USERNAME:}
spring.datasource.password=${DB_PASSWORD:}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.show-sql=${SHOW_SQL:false}
spring.flyway.enabled=${FLYWAY_ENABLED:true}
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration

# Server
server.port=${PORT:${SERVER_PORT:8080}}
server.servlet.context-path=/
server.forward-headers-strategy=framework
logging.level.org.apache.coyote.http11.Http11Processor=ERROR

# JWT
app.jwt.secret=${APP_JWT_SECRET:change-me-to-a-long-256-bit-secret}
app.jwt.expiry-ms=${APP_JWT_EXPIRY_MS:604800000}
app.jwt.refresh-expiry-ms=${APP_JWT_REFRESH_EXPIRY_MS:2592000000}

# Firebase (phone OTP login)
app.firebase.credentials-path=${FIREBASE_CREDENTIALS_PATH:classpath:firebase.json}
app.firebase.credentials-json=${FIREBASE_CREDENTIALS_JSON:}
app.firebase.project-id=${FIREBASE_PROJECT_ID:anushabazaar-2288e}

# Dev admin seed
app.admin.seed-enabled=${APP_ADMIN_SEED_ENABLED:false}
app.admin.seed-email=${APP_ADMIN_SEED_EMAIL:}
app.admin.seed-password=${APP_ADMIN_SEED_PASSWORD:}
app.admin.seed-name=${APP_ADMIN_SEED_NAME:}

# Razorpay
app.razorpay.enabled=${APP_RAZORPAY_ENABLED:false}
app.razorpay.key-id=${APP_RAZORPAY_KEY_ID:}
app.razorpay.key-secret=${APP_RAZORPAY_KEY_SECRET:}
app.razorpay.webhook-secret=${APP_RAZORPAY_WEBHOOK_SECRET:}
app.razorpay.currency=${APP_RAZORPAY_CURRENCY:INR}
app.razorpay.api-base-url=${APP_RAZORPAY_API_BASE_URL:https://api.razorpay.com/v1}
app.razorpay.merchant-name=${APP_RAZORPAY_MERCHANT_NAME:VR Technologies}

# CORS
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:5174,https://vr.anushatechnologies.com,https://venkat.anushatechnologies.com,https://myadmin.anushatechnologies.com,https://admin.anushatechnologies.com}

# Mail (Gmail SMTP via App Password)
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_APP_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=10000
spring.mail.properties.mail.smtp.timeout=10000
spring.mail.properties.mail.smtp.writetimeout=10000

# Admin 2FA email OTP
app.admin.otp.from=${MAIL_FROM:${MAIL_USERNAME:}}
app.admin.otp.from-name=${MAIL_FROM_NAME:VR Technologies Admin}
app.admin.otp.length=${ADMIN_OTP_LENGTH:6}
app.admin.otp.ttl-minutes=${ADMIN_OTP_TTL_MINUTES:10}
app.admin.otp.resend-cooldown-seconds=${ADMIN_OTP_RESEND_COOLDOWN_SECONDS:60}
app.admin.otp.max-attempts=${ADMIN_OTP_MAX_ATTEMPTS:5}
app.admin.otp.dev-log=${ADMIN_OTP_DEV_LOG:true}
app.admin.otp.required-roles=${ADMIN_OTP_REQUIRED_ROLES:SUPER_ADMIN}

# Generic WhatsApp notification provider. The endpoint receives JSON:
# { "to": "...", "subject": "...", "message": "...", "eventType": "..." }
app.whatsapp.enabled=${APP_WHATSAPP_ENABLED:false}
app.whatsapp.provider-url=${APP_WHATSAPP_PROVIDER_URL:}
app.whatsapp.bearer-token=${APP_WHATSAPP_BEARER_TOKEN:}

# Cloudinary
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:}
cloudinary.api-key=${CLOUDINARY_API_KEY:}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:}
# File upload
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=110MB
